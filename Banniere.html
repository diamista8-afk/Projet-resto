<link rel="stylesheet" href="style.css"><!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Le Baobab Gourmand</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">

</head>
<body class="wel">

<section class="banner">

  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

  <div class="content">

    <div class="ornement"></div>


    <h1>
      <span class="line-wrap headline1"><span>Le</span></span>
      <span class="line-wrap headline italic"><span>BAOBAB</span></span>
      <span class="line-wrap headline1"><span>Gourmand.</span></span>
    </h1>

    <p class="sub">
      Laissez-vous porter par une expérience culinaire unique,
      entre ciel et montagne.
    </p>

    <button class="btn-welcome">
      <span>Bienvenue</span>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <line x1="5" y1="12" x2="19" y2="12"/>
        <polyline points="13 6 19 12 13 18"/>
      </svg>
    </button>

    <div class="ornement-bottom"></div>

  </div>

</section>
<script src="script.js"></script>
</body>
</html>
